# alembic.ini — Alembic configuration
#
# IMPORTANT: sqlalchemy.url is intentionally set to a placeholder here.
# The real URL is injected from settings (DATABASE_URL env var) in alembic/env.py.
# Never put a real connection string in this file.

[alembic]
script_location = alembic
prepend_sys_path = .
# Placeholder — overridden in env.py from environment variable
sqlalchemy.url = driver://user:pass@localhost/dbname

# Naming convention for auto-generated migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long slugs to keep filenames sane
truncate_slug_length = 40

# Timezone for migration timestamps
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
